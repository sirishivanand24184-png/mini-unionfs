name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libfuse3-dev pkg-config gcc make

      - name: Build (release)
        run: make

      - name: Run C unit tests
        run: make test-unit

      - name: Run shell tests
        run: |
          # Load FUSE module if available
          sudo modprobe fuse 2>/dev/null || true
          # Only run shell tests if /dev/fuse is accessible
          if [ -c /dev/fuse ]; then
            make test-shell
          else
            echo "FUSE device not available in this environment; skipping shell tests"
          fi

      - name: Build (debug)
        run: make debug
